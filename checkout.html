<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VELTRIX Checkout</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>

:root{
  --cream:#f5f0e8;
  --ink:#1a1410;
  --gold:#c9a84c;
  --gold-light:#e8d5a3;
  --rust:#b5462a;
  --warm:#f0e6d3;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--cream);
  color:var(--ink);
  font-family:'DM Sans',sans-serif;
}

/* HEADER */

header{
  padding:22px 6%;
  border-bottom:1px solid rgba(201,168,76,.25);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-family:'Playfair Display',serif;
  font-size:28px;
  font-weight:900;
  letter-spacing:3px;
}

.logo span{
  color:var(--gold);
}

.back-link{
  text-decoration:none;
  color:var(--ink);
  font-size:12px;
  letter-spacing:2px;
  text-transform:uppercase;
  opacity:.6;
  transition:.3s;
}

.back-link:hover{
  opacity:1;
}

/* MAIN */

.checkout-wrap{
  display:grid;
  grid-template-columns:1.3fr .7fr;
  gap:40px;
  padding:70px 6%;
}

/* FORM */

.checkout-form{
  background:white;
  padding:45px;
  border:1px solid rgba(201,168,76,.2);
}

.section-label{
  font-size:10px;
  letter-spacing:4px;
  text-transform:uppercase;
  color:var(--gold);
  margin-bottom:12px;
}

.checkout-title{
  font-family:'Playfair Display',serif;
  font-size:48px;
  margin-bottom:40px;
}

.form-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.form-group{
  margin-bottom:22px;
}

.form-group label{
  display:block;
  margin-bottom:10px;
  font-size:13px;
  letter-spacing:1px;
}

.form-group input,
.form-group textarea{
  width:100%;
  padding:16px;
  border:1px solid rgba(0,0,0,.1);
  background:#fff;
  font-size:14px;
  font-family:'DM Sans',sans-serif;
  outline:none;
  transition:.3s;
}

.form-group input:focus,
.form-group textarea:focus{
  border-color:var(--gold);
}

/* PAYMENT */

.payment-title{
  margin-top:20px;
  margin-bottom:18px;
  font-size:13px;
  letter-spacing:2px;
  text-transform:uppercase;
}

.payment-options{
  display:flex;
  gap:14px;
}

.payment-box{
  flex:1;
  border:1px solid rgba(201,168,76,.3);
  padding:18px;
  text-align:center;
  cursor:pointer;
  transition:.3s;
}

.payment-box:hover{
  background:var(--warm);
}

.payment-box h4{
  margin-top:10px;
  font-size:12px;
  letter-spacing:2px;
  text-transform:uppercase;
}

/* BUTTON */

.place-order{
  width:100%;
  margin-top:35px;
  padding:18px;
  border:none;
  background:var(--ink);
  color:var(--cream);
  font-size:12px;
  letter-spacing:4px;
  text-transform:uppercase;
  cursor:pointer;
  transition:.3s;
}

.place-order:hover{
  background:var(--gold);
  color:var(--ink);
}

/* ORDER SUMMARY */

.summary{
  background:#fff;
  border:1px solid rgba(201,168,76,.2);
  padding:40px;
  height:fit-content;
  position:sticky;
  top:30px;
}

.summary-title{
  font-family:'Playfair Display',serif;
  font-size:32px;
  margin-bottom:30px;
}

.summary-item{
  display:flex;
  justify-content:space-between;
  margin-bottom:24px;
  padding-bottom:20px;
  border-bottom:1px solid rgba(0,0,0,.08);
}

.item-name{
  max-width:180px;
  line-height:1.5;
}

.item-price{
  font-family:'Playfair Display',serif;
  color:var(--rust);
  font-size:22px;
}

.total{
  display:flex;
  justify-content:space-between;
  margin-top:30px;
  align-items:center;
}

.total h3{
  font-size:11px;
  letter-spacing:3px;
  text-transform:uppercase;
  opacity:.5;
}

.total-price{
  font-family:'Playfair Display',serif;
  font-size:38px;
  color:var(--ink);
}

/* MOBILE */

@media(max-width:900px){

  .checkout-wrap{
    grid-template-columns:1fr;
  }

  .form-row{
    grid-template-columns:1fr;
  }

}

</style>
</head>

<body>

<header>

  <div class="logo">VELTR<span>I</span>X</div>

  <a href="#" class="back-link">← Continue Shopping</a>

</header>

<div class="checkout-wrap">

  <!-- LEFT -->

  <div class="checkout-form">

    <div class="section-label">
      Secure Checkout
    </div>

    <div class="checkout-title">
      Complete Your Order
    </div>

    <div class="form-row">

      <div class="form-group">
        <label>First Name</label>
        <input type="text">
      </div>

      <div class="form-group">
        <label>Last Name</label>
        <input type="text">
      </div>

    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email">
    </div>

    <div class="form-group">
      <label>Phone Number</label>
      <input type="text">
    </div>

    <div class="form-group">
      <label>Shipping Address</label>
      <textarea rows="5"></textarea>
    </div>

    <div class="form-row">

      <div class="form-group">
        <label>City</label>
        <input type="text">
      </div>

      <div class="form-group">
        <label>PIN Code</label>
        <input type="text">
      </div>

    </div>

    <div class="payment-title">
      Payment Method
    </div>

    <div class="payment-options">

      <div class="payment-box">
        💳
        <h4>Card</h4>
      </div>

      <div class="payment-box">
        📱
        <h4>UPI</h4>
      </div>

      <div class="payment-box">
        💵
        <h4>COD</h4>
      </div>

    </div>

    <button class="place-order">
      Place Order
    </button>

  </div>

  <!-- RIGHT -->

  <div class="summary">

    <div class="summary-title">
      Order Summary
    </div>

    <div id="cartSummary"></div>

    <div class="total">

      <div>
        <h3>Total</h3>
      </div>

      <div class="total-price" id="orderTotal">
        ₹0
      </div>

    </div>

  </div>

</div>

<script>
  function fmt(n){return '₹' + n.toLocaleString('en-IN');}
  
  function loadCartSummary(){
    // Try localStorage first, then fall back to URL parameters or parent window
    let cart = JSON.parse(localStorage.getItem('vx_cart') || '[]');
    
    // If cart is empty, try sessionStorage (cross-tab fallback)
    if(cart.length === 0){
      cart = JSON.parse(sessionStorage.getItem('vx_cart') || '[]');
    }
    
    const summaryDiv = document.getElementById('cartSummary');
    const totalDiv = document.getElementById('orderTotal');
    
    if(cart.length === 0){
      summaryDiv.innerHTML = '<p style="text-align:center;opacity:0.5;padding:40px 0;">Your cart is empty. <br/><a href="index.html" style="color:var(--gold);text-decoration:underline;">← Return to shop</a></p>';
      totalDiv.textContent = '₹0';
      return;
    }
    
    let total = 0;
    const itemsHtml = cart.map(item => {
      const itemTotal = item.price * item.qty;
      total += itemTotal;
      return `
        <div class="summary-item">
          <div class="item-name">
            ${item.name} <span style="font-size:12px;opacity:0.6;"> x${item.qty}</span>
          </div>
          <div class="item-price">
            ${fmt(itemTotal)}
          </div>
        </div>
      `;
    }).join('');
    
    summaryDiv.innerHTML = itemsHtml;
    totalDiv.textContent = fmt(total);
  }
  
  // Load cart when page loads
  loadCartSummary();
  
  // Listen for storage changes from other tabs/windows
  window.addEventListener('storage', loadCartSummary);
</script>

</body>
</html>
